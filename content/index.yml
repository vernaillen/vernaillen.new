faq:
  title: Frequently Asked Questions
  description: Answers to common questions about working with me.
  categories:
    - title: Services & Expertise
      questions:
        - label: What services do you offer?
          content: |
            I specialize in full stack web development with Java/Spring backends and Nuxt/Vue frontends. This includes API development & integration, building modern web portals, setting up CI/CD pipelines, and DevOps with Docker and Kubernetes. I also build headless WordPress solutions using my open source WPNuxt module.
        - label: What is your tech stack?
          content: |
            My primary stack is Java and Spring Framework on the backend, with Nuxt and Vue.js on the frontend. For DevOps I work with Docker, Kubernetes, and Jenkins. I deploy to Vercel for frontend projects and have extensive experience with Liferay portal platforms.
        - label: Do you work with startups or only enterprises?
          content: |
            Both! While much of my career has been in enterprise environments (government, large corporations), I also enjoy working with smaller teams and startups. My open source work on WPNuxt is a good example of building developer tools from the ground up.
    - title: Working Together
      questions:
        - label: Are you available for freelance work?
          content: |
            Yes, I've been freelancing since 2013. I'm available for both long-term engagements and shorter project-based work. Feel free to schedule a call via Calendly to discuss your project.
        - label: Where are you based?
          content: |
            I'm based in Belgium (Europe/Brussels timezone). I work primarily remotely, for Belgian and international clients alike — for clients in Belgium I'm available on-site up to one day a week.
        - label: How can I get in touch?
          content: |
            The easiest way is to schedule a 15-minute call on [Calendly](https://calendly.com/vernaillen/15min). You can also reach me on [LinkedIn](https://www.linkedin.com/in/woutervernaillen/) or [GitHub](https://github.com/vernaillen/).
    - title: About Me
      questions:
        - label: What do you enjoy most about your work?
          content: |
            I love bridging the gap between robust backend systems and beautiful, fast frontends. There's something satisfying about making a complex enterprise system feel effortless to use. Building open source tools like WPNuxt and seeing others use them is also incredibly rewarding.
        - label: What are your interests outside of coding?
          content: |
            Sound, music and dance are a big part of my life. I'm a sound healing practitioner, ecstatic dance DJ, and trance dance facilitator — you can find more about that on [Harmonics.be](https://harmonics.be). I'm also an avid traveler, always curious about other cultures.
