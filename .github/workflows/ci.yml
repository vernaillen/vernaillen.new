name: ci

on: push

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [26]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check
        run: pnpm run check

  # Build the production image, smoke-test it boots and serves, then push to the
  # self-hosted registry. Runs on native amd64 (no QEMU) after `ci` passes, and
  # only on main. This replaces the Jenkins dockerSmokeTest + the on-master builds.
  build-push:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      IMAGE: registry.apps.vernaillen.dev/vernaillen-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the registry
        uses: docker/login-action@v3
        with:
          registry: registry.apps.vernaillen.dev
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # load: true keeps the image local so we can smoke-test before pushing.
      # Native amd64 runner => better-sqlite3 uses its prebuilt binary, no compile.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          secrets: |
            nuxt_github_token=${{ secrets.NUXT_GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (boot the image and hit it on :3000)
        run: |
          docker run -d --name smoke -p 3000:3000 "${IMAGE}:${{ github.sha }}"
          ok=0
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:3000/; then ok=1; break; fi
            sleep 1
          done
          echo "----- container logs -----"; docker logs smoke || true
          docker rm -f smoke >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "::error::Smoke test failed — image did not serve on :3000"; exit 1; }

      - name: Push image
        run: |
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"
